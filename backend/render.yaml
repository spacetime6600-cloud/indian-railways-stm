services:
  - type: web
    name: ir-stm-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          name: ir-stm-ml
          type: web
          property: host

  - type: web
    name: ir-stm-ml
    env: python
    rootDir: ai/railways-ml-system/railways-ml-system
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
